databases:
  - name: vehicle-insurance-db
    plan: free
    databaseName: insurance
    user: insurance

services:
  - type: web
    name: vehicle-insurance-demo
    runtime: docker
    plan: free
    region: oregon
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: vehicle-insurance-db
          property: connectionString
